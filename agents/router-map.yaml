agents:
  - id: agent.visual-style
    categories:
      - visual-style
      - web-ui
    route_priority: 90
    preferred_skills:
      - taste.taste-core
      - taste.images-taste
      - taste.redesign
      - taste.gpt-taste
      - taste.soft
      - taste.minimalist
      - taste.brutalist
      - taste.stitch
      - taste.output-enforcement
      - web.interface-design-core
    curated_primary_skills:
      - taste.taste-core
      - taste.images-taste
      - taste.redesign
      - taste.output-enforcement
    default_execution_mode: image-first
    execution_chain:
      - intent_normalization
      - agent.visual-style
      - execution.image-first
      - execution.style-redesign
      - execution.design-spec
      - docs/web-high-fidelity-replication-playbook.md
      - docs/derived-integration-note.md#agent-routing-bridge
    required_quality_gates:
      - anti-slop-core
      - output-enforcement
    workflow_degrade_policy:
      trigger: image_generation_unavailable
      fallback_mode: design-spec
      required_label: "[Image-First Degraded]"
      required_notice: "Image generation is unavailable. Switched to text-first guidance with visual parity risk."
    intent_keywords:
      - image-first
      - redesign
      - style profile
      - visual style
      - minimalist
      - brutalist
      - soft ui
      - stitch design
      - output enforcement
    intent_match:
      synonym_group: visual-style
      min_keyword_hits: 1
    priority_when_any_keywords_present:
      - image-first
      - redesign
      - style profile
      - minimalist
      - brutalist
      - soft ui
      - stitch design
      - output enforcement
    fallback:
      - web.interface-design-core
      - library.curated-design-reference

  - id: agent.web-design
    categories:
      - web-ui
      - ux-adjacent
    route_priority: 60
    preferred_skills:
      - web.interface-design-core
      - web.layout-hierarchy
      - web.state-spec
      - web.responsive-qa
      - ux.review-suite
      - ux.ux-friction-scan
      - ux.flow-clarity-pass
    curated_primary_skills:
      - web.interface-design-core
      - web.layout-hierarchy
      - web.state-spec
      - ux.review-suite
    default_execution_mode: html-design
    execution_chain:
      - intent_normalization
      - agent.web-design
      - execution.html-design
      - execution.prototype
      - execution.animation
      - docs/web-high-fidelity-replication-playbook.md
      - docs/derived-integration-note.md#agent-routing-bridge
    replication_execution:
      enabled: true
      entrypoint: agent.web-design
      fixed_skill_chain:
        - web.interface-design-core
        - web.layout-hierarchy
        - web.state-spec
        - web.responsive-qa
        - system.component-ruleset
        - ux.a11y-light-audit
      page_batching:
        batch_size_min: 2
        batch_size_max: 4
        gate_required_before_next_batch: true
      per_batch_gate:
        - structure_fidelity_pass
        - visual_rhythm_pass
        - interaction_state_pass
        - responsive_pass
        - accessibility_pass
        - component_consistency_pass
      replication_deliverables:
        - semantic_layout_blueprint
        - component_state_matrix
        - breakpoint_behavior_matrix
        - css_architecture_ruleset
        - accessibility_issue_checklist
        - asset_replacement_map
    required_quality_gates:
      - anti-slop-core
      - output-enforcement
    intent_keywords:
      - web ui
      - interface layout
      - prototype
      - html design
      - responsive
      - component state
      - landing page
    intent_match:
      synonym_group: web-ui
      min_keyword_hits: 1
    fallback:
      - library.curated-design-reference

  - id: agent.design-system
    categories:
      - design-system
      - ux-adjacent
    route_priority: 50
    preferred_skills:
      - system.signature-visual-language
      - system.token-audit
      - system.component-ruleset
      - system.visual-drift-review
      - ux.review-suite
      - ux.a11y-light-audit
    curated_primary_skills:
      - system.signature-visual-language
      - system.token-audit
      - system.component-ruleset
      - ux.a11y-light-audit
    default_execution_mode: critique
    execution_chain:
      - intent_normalization
      - agent.design-system
      - execution.critique
      - execution.html-design
      - execution.analysis
      - docs/design-skill-canonical-map.md
      - docs/derived-integration-note.md#agent-routing-bridge
    intent_keywords:
      - design system
      - visual language
      - token
      - component standard
      - consistency
    intent_match:
      synonym_group: design-system
      min_keyword_hits: 2
    fallback:
      - library.curated-design-reference

  - id: agent.diagram-design
    categories:
      - diagram-flow
    route_priority: 50
    preferred_skills:
      - diagram.diagram-design-core
      - diagram.flow-skeleton
      - diagram.branch-logic-normalize
      - diagram.diagram-clarity-check
    curated_primary_skills:
      - diagram.diagram-design-core
      - diagram.flow-skeleton
    default_execution_mode: slides
    execution_chain:
      - intent_normalization
      - agent.diagram-design
      - execution.slides
      - execution.animation
      - execution.critique
      - docs/agent-router-validation-matrix.md
      - docs/derived-integration-note.md#agent-routing-bridge
    intent_keywords:
      - flowchart
      - user flow
      - process diagram
      - architecture diagram
      - decision tree
    intent_match:
      synonym_group: diagram-flow
      min_keyword_hits: 2
    fallback:
      - library.curated-design-reference

  - id: agent.comp-design
    categories:
      - computational-design
    route_priority: 50
    preferred_skills:
      - comp.workflow-calculator
      - comp.climate-analysis
      - comp.site-solar-analysis
      - comp.building-load-calculations
      - comp.lifecycle-sustainability
      - comp.accessibility-code-compliance
      - comp.computational-design-suite
    curated_primary_skills:
      - comp.computational-design-suite
      - comp.site-solar-analysis
    default_execution_mode: analysis
    execution_chain:
      - intent_normalization
      - agent.comp-design
      - execution.analysis
      - docs/comp-design-fallback-guard-template.md
      - docs/derived-integration-note.md#agent-routing-bridge
    intent_keywords:
      - computational design
      - climate analysis
      - solar analysis
      - building load
      - sustainability
      - performance goal
      - code compliance
    intent_match:
      synonym_group: computational-design
      min_keyword_hits: 2
    risk_flags:
      - cross-category-fallback-needs-domain-check
      - reference-fallback-should-include-disclaimer
    fallback_constraints:
      - only use fallback when no computational skill meets intent
      - include reference-mode disclaimer in response
      - request missing computational inputs before final recommendation
    fallback_guard:
      trigger_mode: no-direct-computational-skill-match
      required_inputs:
        - location_or_climate_zone
        - geometry_or_massing_assumptions
        - target_performance_goal
      intent_input_hints:
        climate-analysis:
          - location_or_climate_zone
          - seasonal_priority
          - envelope_assumptions
        site-solar-analysis:
          - site_orientation
          - massing_assumptions
          - daylight_or_solar_goal
        building-load-calculations:
          - occupancy_program_assumptions
          - envelope_assumptions
          - operation_schedule_assumptions
      response_contract:
        - prepend_label: "[Reference Mode]"
        - include_disclaimer: "This is reference-only guidance, not a computational result."
        - include_missing_input_checklist: true
        - block_final_recommendation_when_inputs_missing: true
    fallback:
      - library.curated-design-reference
