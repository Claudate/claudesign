version: 1
last_updated: 2026-04-23
curation_profile: curated-core-v1
integration_profile: claudesign-core-v1
fallback_policy:
  order:
    - same-category-preferred-skills
    - cross-category-reference-skills
  notes:
    - fallback should prefer executable skills before reference skills
    - if no fallback exists, return explicit no-match and request clarification
    - for computational-design, cross-category fallback must be guarded with domain checks
    - guarded fallback must declare reference mode and request missing critical inputs
site_replication_policy:
  mode: quality-first-high-fidelity
  allowed_scope:
    - visual
    - interaction
    - information_hierarchy
  prohibited_scope:
    - unauthorized_brand_assets
    - copyrighted_text_or_media
    - restricted_source_code_copy
  anti_ai_look_rules:
    - avoid template-like hero repetition across pages
    - avoid repetitive same-shape card rhythm without hierarchy
    - enforce intentional whitespace and typographic contrast
    - forbid placeholder truncation patterns such as ellipsis-only code

shared_quality_gates:
  anti-slop-core:
    scope:
      - agent.web-design
      - agent.visual-style
    checks:
      - avoid_template_hero_repetition
      - avoid_repetitive_card_rhythm_without_hierarchy
      - enforce_intentional_whitespace_and_typographic_contrast
      - enforce_loading_empty_error_focus_active_state_coverage
  output-enforcement:
    scope:
      - agent.web-design
      - agent.visual-style
    banned_placeholder_patterns:
      - "..."
      - "TODO"
      - "rest of code"
      - "continue pattern"
      - "implement here"
    completion_contract:
      - no_placeholder_shortcuts
      - no_partial_skeleton_when_full_output_requested
      - enforce_clean_pause_marker_if_token_limited
execution_bridge:
  enabled: true
  runtime: claudesign
  route_pipeline:
    - intent_normalization
    - agent_match
    - execution_mode_resolution
    - reference_doc_routing
  mode_catalog:
    prototype:
      description: fast structural prototype output for page and flow concepts
    slides:
      description: presentation-friendly diagram and storyboard output
    animation:
      description: motion and state-transition oriented output
    critique:
      description: review-first output for audits, drift checks, and a11y findings
    html-design:
      description: high-fidelity page and component specification output
    analysis:
      description: quantified or research-like output with explicit assumptions
    image-first:
      description: generate visual reference first, then analyze and implement with explicit degradation policy
    style-redesign:
      description: audit-first visual redesign output with stack-compatible upgrade strategy
    design-spec:
      description: style profile rules and semantic design specification output

